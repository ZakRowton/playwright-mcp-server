services:
  playwright-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-playwright-mcp
    restart: unless-stopped
    ports:
      - "8931:8931"
    command: ["--port", "8931", "--host", "0.0.0.0"]
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8931/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
