services:
  playwright-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-playwright-mcp
    restart: unless-stopped
    ports:
      - "8933:8933"
    command: ["--port", "8933", "--host", "0.0.0.0"]
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8933/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
